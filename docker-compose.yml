version: '3.8'

services:
  engine-manager:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: engine-manager
    ports:
      - "4004:3004"
    environment:
      - ENGINE_MANAGER_PORT=3004
    networks:
      - app-network
    restart: unless-stopped

  remote-serv:
    build:
      context: ./remote-serv
      dockerfile: Dockerfile
    container_name: remote-serv
    ports:
      - "8080:8080"
    environment:
      - ENGINE_MANAGER_URL=http://engine-manager:3004
      - SESSION_TTL=${SESSION_TTL:-2160h}
      - SESSION_CLEANUP_INTERVAL=${SESSION_CLEANUP_INTERVAL:-1h}
    depends_on:
      - engine-manager
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
